events {}

http {
  upstream nextjs { server client:3000; }
  upstream fastapi { server server:8000; }

  server {
    listen 80;
    server_name _;

    # Next.js pages, static & API routes
    location / {
      proxy_pass http://nextjs;
      proxy_set_header Host $host;
    }

    # FastAPI REST endpoints (if you keep /api prefix)
    location /api/ {
      proxy_pass http://fastapi;
      proxy_set_header Host $host;
    }

    # --- Socket.IO signalling: upgrade ---
    location /socket.io/ {
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_pass http://fastapi;
    }
  }
}
