# nginx.conf

events {}

http {
  upstream nextjs { server client:3000; }
  upstream fastapi { server server:8000; }

  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  server {
    listen 80;
    server_name _;

    # Client pages, static & API routes
    location / {
      proxy_pass http://nextjs;
      proxy_set_header Host $host;
    }

    # Socket.IO (text + WS) ------------------------------------------
    location ^~ /socket.io {    # no slash – catches both
        proxy_pass http://fastapi;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_buffering off;
    }
  }
}
