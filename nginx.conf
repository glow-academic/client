# nginx.conf
# ----------  core tweaks ----------
# Map Upgrade headers once so we can reuse them
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

worker_processes  auto;
events { worker_connections  1024; }

http {
    # Put upstreams in one place (simplifies reuse)
    upstream next_client  { server client:3000; }
    upstream api_socketio { server server:8000; }

    server {
        listen 80;
        # If you have a domain, add: server_name example.com;

        # ----------  Next.js frontend ----------
        location / {
            proxy_pass         http://next_client;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ----------  Socket.IO & WebRTC signalling ----------
        # Everything under /socket.io is proxied to FastAPI (glow-server)
        location /socket.io/ {
            proxy_pass         http://api_socketio;   # ⇢ server:8000
            proxy_http_version 1.1;                   # keep WS alive
            proxy_set_header   Upgrade          $http_upgrade;
            proxy_set_header   Connection       $connection_upgrade;
            proxy_set_header   Host             $host;
            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        }
    }
}
