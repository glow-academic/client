# =============================================================================
# Glow Configuration — Single Source of Truth
# =============================================================================
# Copy this file to config.yaml and fill in your values.
# The .env file is auto-generated from this file — never edit .env directly.
#
# Usage:
#   cp config.example.yaml config.yaml
#   # Edit config.yaml with your values
#   make deploy                             # Generates .env, builds seed, starts services
#
# Or run the interactive setup wizard:
#   make setup                              # Prompts for values, writes config.yaml

# -----------------------------------------------------------------------------
# Instance
# -----------------------------------------------------------------------------
instance:
  name: "glow"                              # COMPOSE_PROJECT_NAME (Docker prefix)
  port: 3000                                # CLIENT_PORT (nginx external port)

# -----------------------------------------------------------------------------
# Domain
# -----------------------------------------------------------------------------
domain:
  origin: "https://glow.university.edu"     # ORIGIN (public URL)
  prefix: ""                                # APP_PREFIX (e.g. "/glow" or empty)

# -----------------------------------------------------------------------------
# Institution
# -----------------------------------------------------------------------------
institution:
  name: "University Name"                   # NEXT_PUBLIC_CAMPUS
  email_domain: "university.edu"            # NEXT_PUBLIC_CAMPUS_EMAIL

# -----------------------------------------------------------------------------
# Database
# -----------------------------------------------------------------------------
database:
  user: "myuser"                            # DB_USER
  password: "mypassword"                    # DB_PASSWORD
  name: "mydb"                              # DB_NAME
  operation: "auto"                          # DB_OPERATION:
                                            #   "auto"            — schema + seed on first start, preserve on restart
                                            #   "modules"         — wipe and rebuild from schema + seed modules
                                            #   "restore"         — restore from latest backup
                                            #   "skip"            — use existing database (no init)

# -----------------------------------------------------------------------------
# Auth
# -----------------------------------------------------------------------------
auth:
  secret: ""                                # AUTH_SECRET (auto-generated if blank)
  secret_key: ""                            # SECRET_KEY for JWT signing (auto-generated if blank)
  keycloak:
    admin_password: "admin"                 # KEYCLOAK_ADMIN_PASSWORD
    realm: "master"                         # KEYCLOAK_REALM
    client_id: "glow-client"                # AUTH_KEYCLOAK_ID
  microsoft:
    client_id: ""                           # AUTH_MICROSOFT_ENTRA_ID_ID
    client_secret: ""                       # AUTH_MICROSOFT_ENTRA_ID_SECRET

# -----------------------------------------------------------------------------
# AI Providers
# -----------------------------------------------------------------------------
providers:
  openai_api_key: ""                        # OPENAI_API_KEY
  gemini_api_key: ""                        # GEMINI_API_KEY

# -----------------------------------------------------------------------------
# Install Mode (for pre-built GHCR images vs source build)
# -----------------------------------------------------------------------------
install:
  use_prebuilt_images: false                # true = docker pull from GHCR, false = build from source
  image_tag: "latest"                       # GHCR tag: "latest", "v1.0.0", etc.

# -----------------------------------------------------------------------------
# Seed Modules (modular seed data selection)
# -----------------------------------------------------------------------------
# Each key maps to a folder in database/modules/.
# Use "all" to load everything in a category, or list specific module names.
# See database/modules/README.md for available modules.
modules:
  # AI Providers (01-providers/)
  providers:
    - openai
    - gemini

  # Models grouped by provider (02-models/{provider}/)
  models:
    openai:
      - gpt-5.1
      - gpt-5
      - gpt-5-mini
      - gpt-5-nano
      - gpt-4.1
      - gpt-oss-20b
      - gpt-audio
      - gpt-audio-mini
      - gpt-realtime
      - gpt-realtime-mini
      - gpt-image-1
      - gpt-image-1-mini
      - sora-2
      - sora-2-pro
    gemini:
      - gemini-2.5-pro
      - gemini-2.5-flash
      - gemini-2.5-flash-lite
      - gemini-2.5-flash-image
      - gemini-3-pro-preview
      - gemini-3-pro-image-preview
      - imagen-4.0-generate-001
      - imagen-4.0-fast-generate-001
      - imagen-4.0-ultra-generate-001
      - veo-3.1-generate-preview
      - veo-3.1-fast-generate-preview

  # System agents (03-agents/) — excludes inactive gemini variants
  agents:
    - agent
    - auth
    - benchmark
    - chat-agent
    - cohort
    - department
    - document
    - eval
    - field
    - grade-agent
    - model
    - parameter
    - persona
    - profile
    - provider
    - rubric
    - scenario
    - setting
    - simulation
    - tool
    - training

  # MCP tools (04-tools/)
  tools: all

  # Generic auth providers (05-auth/)
  auth:
    - google
    - microsoft

  # Base rubrics (06-rubrics/) — rubrics without simulation/video flags
  rubrics: all

  # Evals (07-evals/)
  evals: all

  # Base profiles (08-profiles/) — default admin roles (no department)
  profiles: all

  # Base settings (09-settings/) — default settings (no department)
  settings: all

  # Setup type: loads from 10-setups/{setup}/
  setup: university

  # Organization modules (10-setups/organization/)
  organization:
    departments:
      - general

  # Setup-specific modules (10-setups/university/)
  university:
    departments:
      - purdue-cs
    personas: all
    documents: all
    uploads: all
    texts: all
    fields: all
    parameters: all
    rubrics:
      - ta-rubric
    simulations:
      - happy-practice
      - confused-practice
      - passive-practice
      - aggressive-practice
      - general-practice
      - video-practice
    scenarios: all
    cohorts:
      - practice-cohort
    themes: all
