name: Tag, Build & Release

on:
  push:
    branches: [main, v1]
    paths: ['package.json']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate version matches branch
        run: |
          MAJOR=$(echo "${{ steps.version.outputs.version }}" | cut -d. -f1)
          BRANCH="${{ github.ref_name }}"
          if [ "$BRANCH" = "v1" ] && [ "$MAJOR" != "1" ]; then
            echo "::error::v1 branch must have 1.x.x version, got ${{ steps.version.outputs.version }}"
            exit 1
          fi
          if [ "$BRANCH" = "main" ] && [ "$MAJOR" = "1" ]; then
            echo "::error::main branch must not have 1.x.x version, got ${{ steps.version.outputs.version }}"
            exit 1
          fi

      - name: Check if tag exists
        id: check
        run: |
          if git ls-remote --tags origin | grep -q "refs/tags/v${{ steps.version.outputs.version }}$"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag
        if: steps.check.outputs.exists == 'false'
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Log in to GHCR
        if: steps.check.outputs.exists == 'false'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push Docker image
        if: steps.check.outputs.exists == 'false'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            APP_VERSION=${{ steps.version.outputs.tag }}
          tags: ${{ env.REGISTRY }}/learnloopllc/glow-client:${{ steps.version.outputs.tag }}

      - name: Generate compat.json
        if: steps.check.outputs.should_build == 'true'
        run: |
          python3 -c "
          import yaml, json
          with open('compat.yml') as f:
              data = yaml.safe_load(f)
          data['version'] = '${{ steps.version.outputs.version }}'
          with open('compat.json', 'w') as f:
              json.dump(data, f, indent=2)
          "

      - name: Create or update release
        if: steps.check.outputs.should_build == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if gh release view "$TAG" &>/dev/null; then
            gh release upload "$TAG" compat.json --clobber
          else
            gh release create "$TAG" compat.json \
              --title "$TAG" \
              --generate-notes
          fi

