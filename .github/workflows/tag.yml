name: Tag, Build & Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

permissions:
  contents: write
  packages: write

jobs:
  release:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch || github.ref_name }}

      - name: Read version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate version matches branch
        run: |
          MAJOR=$(echo "${{ steps.version.outputs.version }}" | cut -d. -f1)
          BRANCH="${{ github.event.workflow_run.head_branch || github.ref_name }}"
          if [ "$BRANCH" = "v1" ] && [ "$MAJOR" != "1" ]; then
            echo "::error::v1 branch must have 1.x.x version, got ${{ steps.version.outputs.version }}"
            exit 1
          fi
          if [ "$BRANCH" = "main" ] && [ "$MAJOR" = "1" ]; then
            echo "::error::main branch must not have 1.x.x version, got ${{ steps.version.outputs.version }}"
            exit 1
          fi

      - name: Create tag (idempotent)
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git ls-remote --tags origin | grep -q "refs/tags/${TAG}$"; then
            echo "Tag $TAG already exists, skipping creation"
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            APP_VERSION=${{ steps.version.outputs.tag }}
          tags: ${{ env.REGISTRY }}/learnloopllc/glow-client:${{ steps.version.outputs.tag }}
          labels: |
            org.opencontainers.image.source=https://github.com/learnloopllc/glow-client

      - name: Generate compat.json
        run: |
          python3 -c "
          import yaml, json
          with open('compat.yml') as f:
              data = yaml.safe_load(f)
          data['version'] = '${{ steps.version.outputs.version }}'
          with open('compat.json', 'w') as f:
              json.dump(data, f, indent=2)
          "

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if gh release view "$TAG" &>/dev/null; then
            gh release upload "$TAG" compat.json --clobber
          else
            gh release create "$TAG" compat.json \
              --title "$TAG" \
              --generate-notes
          fi
