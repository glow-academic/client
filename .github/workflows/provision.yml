name: Provision

on:
  workflow_dispatch:
    inputs:
      deployment_name:
        description: Unique name for this deployment
        required: true
      subdomain:
        description: Subdomain
        required: true
      base_domain:
        description: Base domain
        required: true
        default: learn-loop.org
      version:
        description: Image version tag (e.g. v1.0.0)
        required: true
      api_url:
        description: Backend API URL
        required: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: learnloopllc/glow-client
  LIVE_DIR: /srv/deploy/live

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Pull image
        run: docker pull "$REGISTRY/$IMAGE_NAME:${{ inputs.version }}"

      - name: Stage release
        run: |
          DEST="${LIVE_DIR}/${{ inputs.deployment_name }}"
          mkdir -p "$DEST/web" "$DEST/scripts"
          cp web/default.conf.template "$DEST/web/"
          cp scripts/*.sh "$DEST/scripts/"
          chmod +x "$DEST/scripts/"*.sh

      - name: Generate docker-compose.yml
        run: |
          DEST="${LIVE_DIR}/${{ inputs.deployment_name }}"
          IMAGE="${REGISTRY}/${IMAGE_NAME}:${{ inputs.version }}"
          NAME="${{ inputs.deployment_name }}"
          API_URL="${{ inputs.api_url }}"
          VERSION="${{ inputs.version }}"
          DOMAIN="${{ inputs.subdomain }}.${{ inputs.base_domain }}"

          AUTH_SECRET="${{ secrets.AUTH_SECRET }}"
          AUTH_KEYCLOAK_ID="${{ secrets.AUTH_KEYCLOAK_ID }}"
          AUTH_KEYCLOAK_SECRET="${{ secrets.AUTH_KEYCLOAK_SECRET }}"

          KEYCLOAK_PUBLIC_URL="${API_URL}/auth"
          API_HOST=$(echo "$API_URL" | sed 's|https\?://||' | sed 's|/.*||')

          cat > "$DEST/docker-compose.yml" <<COMPEOF
          services:
            app-blue:
              image: "${IMAGE}"
              restart: unless-stopped
              extra_hosts:
                - "${API_HOST}:host-gateway"
              environment:
                - HOSTNAME=0.0.0.0
                - DEPLOYMENT_NAME=${NAME}
                - NEXT_PUBLIC_API_URL=${API_URL}
                - INTERNAL_API_BASE=${API_URL}
                - NEXT_PUBLIC_API_BASE=${API_URL}
                - DEPLOYMENT_VERSION=${VERSION}
                - AUTH_SECRET=${AUTH_SECRET}
                - KEYCLOAK_PUBLIC_URL=${KEYCLOAK_PUBLIC_URL}
                - AUTH_KEYCLOAK_ID=${AUTH_KEYCLOAK_ID}
                - AUTH_KEYCLOAK_SECRET=${AUTH_KEYCLOAK_SECRET}
                - AUTH_TRUST_HOST=true
                - NEXTAUTH_URL=https://${DOMAIN}
              healthcheck:
                test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000"]
                interval: 10s
                timeout: 5s
                retries: 3
                start_period: 15s

            app-green:
              image: "${IMAGE}"
              restart: unless-stopped
              extra_hosts:
                - "${API_HOST}:host-gateway"
              environment:
                - HOSTNAME=0.0.0.0
                - DEPLOYMENT_NAME=${NAME}
                - NEXT_PUBLIC_API_URL=${API_URL}
                - INTERNAL_API_BASE=${API_URL}
                - NEXT_PUBLIC_API_BASE=${API_URL}
                - DEPLOYMENT_VERSION=${VERSION}
                - AUTH_SECRET=${AUTH_SECRET}
                - KEYCLOAK_PUBLIC_URL=${KEYCLOAK_PUBLIC_URL}
                - AUTH_KEYCLOAK_ID=${AUTH_KEYCLOAK_ID}
                - AUTH_KEYCLOAK_SECRET=${AUTH_KEYCLOAK_SECRET}
                - AUTH_TRUST_HOST=true
                - NEXTAUTH_URL=https://${DOMAIN}
              healthcheck:
                test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000"]
                interval: 10s
                timeout: 5s
                retries: 3
                start_period: 15s

            nginx:
              image: nginx:alpine
              restart: unless-stopped
              depends_on:
                - app-blue
                - app-green
              environment:
                - ACTIVE_ENV=\${ACTIVE_ENV:-blue}
                - MCP_BACKEND=\${MCP_BACKEND:-glow-nginx:80}
              volumes:
                - ./web/default.conf.template:/etc/nginx/templates/default.conf.template:ro
          COMPEOF
          sed -i 's/^          //' "$DEST/docker-compose.yml"

      - name: Write .env
        run: |
          DEST="${LIVE_DIR}/${{ inputs.deployment_name }}"
          if [ ! -f "$DEST/.env" ]; then
            echo "ACTIVE_ENV=blue" > "$DEST/.env"
          fi

      - name: Detect target environment
        id: env
        run: |
          DEST="${LIVE_DIR}/${{ inputs.deployment_name }}"
          cd "$DEST"
          eval $(bash scripts/detect-env.sh)
          echo "active=$ACTIVE_ENV" >> "$GITHUB_OUTPUT"
          echo "target=$TARGET_ENV" >> "$GITHUB_OUTPUT"

      - name: Deploy target environment
        run: |
          DEST="${LIVE_DIR}/${{ inputs.deployment_name }}"
          cd "$DEST"
          bash scripts/deploy-target.sh "${{ steps.env.outputs.target }}"

      - name: Provision Traefik labels
        run: |
          DEST="${LIVE_DIR}/${{ inputs.deployment_name }}"
          bash scripts/provision.sh deploy \
            --name "${{ inputs.deployment_name }}" \
            --subdomain "${{ inputs.subdomain }}" \
            --base-domain "${{ inputs.base_domain }}" \
            --compose-dir "$DEST" \
            --entry-service nginx \
            --entry-port 80

      - name: Switch traffic
        run: |
          DEST="${LIVE_DIR}/${{ inputs.deployment_name }}"
          cd "$DEST"
          bash scripts/switch-traffic.sh "${{ steps.env.outputs.target }}"

      - name: Monitor deployment
        run: |
          DEST="${LIVE_DIR}/${{ inputs.deployment_name }}"
          cd "$DEST"
          bash scripts/monitor.sh "${{ steps.env.outputs.target }}" "${{ steps.env.outputs.active }}" 45

      - name: Verify deployment
        run: |
          DOMAIN="${{ inputs.subdomain }}.${{ inputs.base_domain }}"
          echo "Checking https://${DOMAIN}/ ..."
          for i in $(seq 1 30); do
            if curl -sf "https://${DOMAIN}/" 2>/dev/null | head -c 100 | grep -q '<'; then
              echo "Deployment verified!"
              exit 0
            fi
            sleep 2
          done
          echo "Warning: Health check did not pass within 60s (may still be starting)"
