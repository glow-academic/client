name: Halt

on:
  workflow_dispatch:
    inputs:
      deployment_name:
        description: 'Deployment name'
        required: true

env:
  LIVE_DIR: /srv/deploy/live

jobs:
  stop:
    runs-on: self-hosted
    steps:
      - name: Stop containers
        run: |
          DEST="${{ env.LIVE_DIR }}/${{ inputs.deployment_name }}"
          if [ -d "$DEST" ]; then
            cd "$DEST"
            docker compose stop 2>/dev/null || true
            echo "Containers stopped."
          else
            echo "No deployment directory found at $DEST"
          fi
