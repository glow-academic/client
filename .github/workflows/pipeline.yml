name: Pipeline

on:
  push:
    branches: [main, v1]
  pull_request:
    branches: [main, v1]
  workflow_dispatch:

permissions:
  contents: write
  workflows: write
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  # ── Stage 1: Test ───────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: https://example.com
        run: bun run build

  # ── Stage 2: Release ────────────────────────────────────────
  release:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    outputs:
      released: ${{ steps.check.outputs.released }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          BRANCH="${{ github.ref_name }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Validate version matches branch
        run: |
          MAJOR=$(echo "${{ steps.version.outputs.version }}" | cut -d. -f1)
          BRANCH="${{ github.ref_name }}"
          if [ "$BRANCH" = "v1" ] && [ "$MAJOR" != "1" ]; then
            echo "::error::v1 branch must have 1.x.x version, got ${{ steps.version.outputs.version }}"
            exit 1
          fi
          if [ "$BRANCH" = "main" ] && [ "$MAJOR" = "1" ]; then
            echo "::error::main branch must not have 1.x.x version, got ${{ steps.version.outputs.version }}"
            exit 1
          fi

      - name: Check if release exists
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if gh release view "$TAG" &>/dev/null; then
            echo "Release $TAG already exists — skipping build"
            echo "released=false" >> $GITHUB_OUTPUT
          else
            echo "Release $TAG not found — will build"
            echo "released=true" >> $GITHUB_OUTPUT
          fi

      - name: Create tag (idempotent)
        if: steps.check.outputs.released == 'true'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q .; then
            echo "Tag $TAG already exists — skipping"
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - uses: docker/login-action@v4
        if: steps.check.outputs.released == 'true'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - uses: docker/build-push-action@v6
        if: steps.check.outputs.released == 'true'
        with:
          context: .
          push: true
          build-args: |
            APP_VERSION=${{ steps.version.outputs.tag }}
          tags: |
            ${{ env.REGISTRY }}/learnloopllc/glow-client:${{ steps.version.outputs.tag }}
          labels: |
            org.opencontainers.image.source=https://github.com/learnloopllc/glow-client

      - name: Generate compat.json
        if: steps.check.outputs.released == 'true'
        run: |
          python3 -c "
          import yaml, json
          with open('compat.yml') as f:
              data = yaml.safe_load(f)
          data['version'] = '${{ steps.version.outputs.version }}'
          with open('compat.json', 'w') as f:
              json.dump(data, f, indent=2)
          "

      - name: Create release
        if: steps.check.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          gh release create "$TAG" compat.json \
            --title "$TAG" \
            --generate-notes
          echo "Created release $TAG"
