name: CI

on:
  push:
    branches: [main, v1]
  pull_request:
    branches: [main, v1]

jobs:
  build:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: https://example.com
        run: bun run build
