name: Build & Push

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract version
        id: meta
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.version }}
          tags: |
            ${{ env.REGISTRY }}/learnloopllc/glow-client:${{ steps.meta.outputs.version }}
            ${{ env.REGISTRY }}/learnloopllc/glow-client:latest

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" --title "$TAG" --generate-notes || true

      - name: Generate GitHub App token
        if: startsWith(github.ref, 'refs/tags/v')
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.DEPLOY_APP_ID }}
          private-key: ${{ secrets.DEPLOY_APP_PRIVATE_KEY }}
          owner: learnloopllc

      - name: Dispatch compat-update
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          MIN_API=$(grep 'min_glow_api' compat.yml | cut -d'"' -f2)
          gh api repos/learnloopllc/api/dispatches \
            -f event_type=compat-update \
            -f 'client_payload[component]=glow-client' \
            -f "client_payload[version]=$VERSION" \
            -f "client_payload[min_glow_api]=$MIN_API"
