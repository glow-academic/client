name: Container Logs

on:
  workflow_dispatch:
    inputs:
      deployment_name:
        description: 'Deployment name'
        required: true

env:
  LIVE_DIR: /srv/deploy/live

jobs:
  logs:
    runs-on: self-hosted
    steps:
      - name: Container status
        run: |
          cd "${LIVE_DIR}/${{ inputs.deployment_name }}"
          echo "=== Container status ==="
          docker compose ps -a
          echo ""
          echo "=== docker-compose.override.yml ==="
          cat docker-compose.override.yml 2>/dev/null || echo "No override file"

      - name: Nginx logs
        run: |
          cd "${LIVE_DIR}/${{ inputs.deployment_name }}"
          echo "=== Nginx logs ==="
          docker compose logs nginx --tail=50 2>&1

      - name: App-blue logs
        run: |
          cd "${LIVE_DIR}/${{ inputs.deployment_name }}"
          echo "=== App-blue logs ==="
          docker compose logs app-blue --tail=50 2>&1

      - name: App-green logs
        run: |
          cd "${LIVE_DIR}/${{ inputs.deployment_name }}"
          echo "=== App-green logs ==="
          docker compose logs app-green --tail=50 2>&1

      - name: Current .env
        run: |
          cd "${LIVE_DIR}/${{ inputs.deployment_name }}"
          echo "=== ACTIVE_ENV ==="
          grep ACTIVE_ENV .env 2>/dev/null || echo "No .env file"
