name: Destroy

on:
  workflow_dispatch:
    inputs:
      deployment_name:
        description: 'Deployment name'
        required: true

env:
  LIVE_DIR: /srv/deploy/live

jobs:
  teardown:
    runs-on: self-hosted
    steps:
      - name: Checkout scripts
        uses: actions/checkout@v4
        with:
          sparse-checkout: scripts

      - name: Teardown via provisioner
        run: |
          bash scripts/provision.sh teardown \
            --name "${{ inputs.deployment_name }}" \
            --compose-dir "${{ env.LIVE_DIR }}/${{ inputs.deployment_name }}"

      - name: Clean up deployment directory
        run: |
          DEST="${{ env.LIVE_DIR }}/${{ inputs.deployment_name }}"
          if [ -d "$DEST" ]; then
            rm -rf "$DEST"
            echo "Deployment directory removed."
          fi

      - name: Teardown complete
        run: echo "Teardown complete for ${{ inputs.deployment_name }}"
