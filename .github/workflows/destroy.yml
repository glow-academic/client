name: Destroy

on:
  workflow_dispatch:
    inputs:
      deployment_id:
        description: 'Deployment UUID'
        required: true

env:
  LIVE_DIR: /srv/deploy/live/glow-client

jobs:
  teardown:
    runs-on: [self-hosted, linux, x64, deploy]
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: scripts

      - name: Teardown via provisioner
        run: |
          DEPLOY_DIR="${{ env.LIVE_DIR }}/${{ inputs.deployment_id }}"
          if [ -d "$DEPLOY_DIR" ] && [ -f "$DEPLOY_DIR/scripts/provision.sh" ]; then
            cd "$DEPLOY_DIR"
            bash scripts/provision.sh teardown \
              --name "${{ inputs.deployment_id }}" \
              --compose-dir "$DEPLOY_DIR"
          else
            echo "Deploy directory not found — skipping teardown"
          fi

      - name: Stop containers
        run: |
          DEPLOY_DIR="${{ env.LIVE_DIR }}/${{ inputs.deployment_id }}"
          if [ -d "$DEPLOY_DIR" ]; then
            cd "$DEPLOY_DIR"
            COMPOSE_PROJECT_NAME="${{ inputs.deployment_id }}" docker compose down --remove-orphans 2>/dev/null || true
          fi

      - name: Clean up deployment directory
        run: |
          DEST="${{ env.LIVE_DIR }}/${{ inputs.deployment_id }}"
          if [ -d "$DEST" ]; then
            rm -rf "$DEST"
            echo "Deployment directory removed."
          fi

      - name: Teardown complete
        run: echo "Teardown complete for ${{ inputs.deployment_id }}"
