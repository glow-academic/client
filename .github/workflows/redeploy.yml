name: Redeploy (Update)

on:
  workflow_dispatch:
    inputs:
      deployment_id:
        description: 'Deployment UUID'
        required: true
      origin:
        description: 'Client origin URL'
        required: true
      instance_id:
        description: 'Instance UUID'
        required: true
      version:
        description: 'Image version (e.g. v1.0.1)'
        required: true
      app_prefix:
        description: 'App prefix for path-based routing'
        required: false
        default: ''
      provision_token:
        description: 'One-time token to claim DEPLOYMENT_TOKEN from LearnLoop'
        required: true
      api_url:
        description: 'Parent API URL'
        required: false
        default: ''
      learnloop_api_url:
        description: 'LearnLoop API URL'
        required: false
        default: 'https://api.learn-loop.org'
      airgapped_api:
        description: 'If true, API has no public URL â€” auth proxied through client nginx'
        required: false
        default: 'false'
      custom_domain:
        description: 'Custom domain (e.g. app.example.com) â€” added to Traefik Host rule'
        required: false
        default: ''
      campus:
        description: 'Campus slug (passed as NEXT_PUBLIC_CAMPUS)'
        required: false
        default: ''

permissions:
  contents: read
  packages: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: learnloopllc/glow-client

jobs:
  detect-active-environment:
    runs-on: [self-hosted, linux, x64, deploy]
    outputs:
      active-env: ${{ steps.detect.outputs.active-env }}
      target-env: ${{ steps.detect.outputs.target-env }}
    env:
      COMPOSE_PROJECT_NAME: ${{ inputs.deployment_id }}
    steps:
      - name: Detect active environment
        id: detect
        run: |
          DEPLOY_DIR="/srv/deploy/live/glow-client/${{ inputs.deployment_id }}"
          if [ -d "$DEPLOY_DIR" ] && [ -f "$DEPLOY_DIR/scripts/detect-env.sh" ]; then
            cd "$DEPLOY_DIR"
            eval $(bash scripts/detect-env.sh)
          fi
          ACTIVE_ENV="${ACTIVE_ENV:-blue}"
          [ -z "$ACTIVE_ENV" ] && ACTIVE_ENV="blue"
          if [ "$ACTIVE_ENV" = "green" ]; then TARGET_ENV="blue"; else TARGET_ENV="green"; fi
          echo "active-env=$ACTIVE_ENV" >> $GITHUB_OUTPUT
          echo "target-env=$TARGET_ENV" >> $GITHUB_OUTPUT

  redeploy:
    runs-on: [self-hosted, linux, x64, deploy]
    needs: [detect-active-environment]
    concurrency:
      group: deploy-${{ inputs.deployment_id }}
      cancel-in-progress: true
    env:
      DEPLOY_DIR: /srv/deploy/live/glow-client/${{ inputs.deployment_id }}
      COMPOSE_PROJECT_NAME: ${{ inputs.deployment_id }}
      ACTIVE_ENV: ${{ needs.detect-active-environment.outputs.active-env }}
      ORIGIN: ${{ inputs.origin }}
      APP_PREFIX: ${{ inputs.app_prefix }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          clean: true

      - name: Login GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Stage release
        run: |
          mkdir -p "$DEPLOY_DIR/web/templates" "$DEPLOY_DIR/web/generated" "$DEPLOY_DIR/scripts"
          cp web/default.conf.template "$DEPLOY_DIR/web/"
          cp web/templates/*.tmpl "$DEPLOY_DIR/web/templates/"
          cp web/generated/upstreams.conf "$DEPLOY_DIR/web/generated/"
          cp scripts/*.sh "$DEPLOY_DIR/scripts/"
          chmod +x "$DEPLOY_DIR/scripts/"*.sh

      - name: Claim DEPLOYMENT_TOKEN from LearnLoop
        run: |
          HOST=$(echo "${{ inputs.learnloop_api_url }}" | sed 's|https\?://||' | sed 's|/.*||')
          RESP=$(curl -sfk -X POST "https://localhost/provision/claim" \
            -H "Host: $HOST" \
            -H "Content-Type: application/json" \
            -d '{"token": "${{ inputs.provision_token }}"}')
          DEPLOYMENT_TOKEN=$(echo "$RESP" | jq -r '.deployment_token')
          if [ -z "$DEPLOYMENT_TOKEN" ] || [ "$DEPLOYMENT_TOKEN" = "null" ]; then
            echo "::error::Failed to claim deployment token"
            echo "::error::Response: $RESP"
            exit 1
          fi
          echo "DEPLOYMENT_TOKEN=${DEPLOYMENT_TOKEN}" >> $GITHUB_ENV
          echo "LEARNLOOP_API_URL=${{ inputs.learnloop_api_url }}" >> $GITHUB_ENV
          echo "Deployment token claimed successfully"

      - name: Update .env with new version
        run: |
          cd "$DEPLOY_DIR"
          if [ -f .env ]; then
            sed -i '/^CLIENT_VERSION=/d' .env
          fi
          echo "CLIENT_VERSION=${{ inputs.version }}" >> .env

      - name: Parse subdomain from ORIGIN
        id: parse-origin
        run: |
          DOMAIN=$(echo "${{ inputs.origin }}" | sed 's|https://||' | sed 's|http://||')
          SUBDOMAIN=$(echo "$DOMAIN" | cut -d. -f1)
          BASE_DOMAIN=$(echo "$DOMAIN" | cut -d. -f2-)
          echo "subdomain=$SUBDOMAIN" >> $GITHUB_OUTPUT
          echo "base-domain=$BASE_DOMAIN" >> $GITHUB_OUTPUT
          echo "domain=$DOMAIN" >> $GITHUB_OUTPUT

      # Regenerate docker-compose.yml from the code at this SHA. Without this,
      # redeploys keep the compose from the original Deploy (New), so env-var
      # changes in the workflow template (e.g. INTERNAL_API_BASE) never reach
      # the container on a redeploy-only path. Mirrors deploy.yml's Generate
      # step (same image, same env).
      - name: Regenerate docker-compose.yml
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:\${CLIENT_VERSION}"
          DOMAIN="${{ steps.parse-origin.outputs.domain }}"
          ORIGIN="${{ inputs.origin }}"
          APP_PREFIX="${{ inputs.app_prefix }}"
          CAMPUS="${{ inputs.campus }}"
          PARENT_NETWORK="glow-${{ inputs.instance_id }}"

          AUTH_CLIENT_SECRET="${AUTH_CLIENT_SECRET:-}"

          if [ "${{ inputs.airgapped_api }}" = "true" ]; then
            API_URL="${ORIGIN}"
          else
            API_URL="${{ inputs.api_url }}"
            if [ -z "$API_URL" ]; then
              API_URL="https://${{ inputs.instance_id }}.learn-loop.org"
            fi
          fi

          cat > "$DEPLOY_DIR/docker-compose.yml" <<COMPOSE
          services:
            app-blue:
              image: "${IMAGE}"
              restart: unless-stopped
              environment:
                - HOSTNAME=0.0.0.0
                - PORT=3000
                - INTERNAL_API_BASE=http://glow-nginx:80
                - AUTH_ISSUER=${API_URL}
                - AUTH_CLIENT_ID=glow-client
                - AUTH_CLIENT_SECRET=${AUTH_CLIENT_SECRET}
                - AUTH_URL=${ORIGIN}${APP_PREFIX}/api/auth
                - AUTH_SECRET=${AUTH_CLIENT_SECRET}
                - NEXT_PUBLIC_CAMPUS=${CAMPUS}
                - APP_PREFIX=${APP_PREFIX}
                - NEXT_PUBLIC_APP_PREFIX=${APP_PREFIX}
              healthcheck:
                test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
                interval: 10s
                timeout: 5s
                retries: 5
                start_period: 30s
              networks:
                - internal

            app-green:
              image: "${IMAGE}"
              restart: unless-stopped
              environment:
                - HOSTNAME=0.0.0.0
                - PORT=3000
                - INTERNAL_API_BASE=http://glow-nginx:80
                - AUTH_ISSUER=${API_URL}
                - AUTH_CLIENT_ID=glow-client
                - AUTH_CLIENT_SECRET=${AUTH_CLIENT_SECRET}
                - AUTH_URL=${ORIGIN}${APP_PREFIX}/api/auth
                - AUTH_SECRET=${AUTH_CLIENT_SECRET}
                - NEXT_PUBLIC_CAMPUS=${CAMPUS}
                - APP_PREFIX=${APP_PREFIX}
                - NEXT_PUBLIC_APP_PREFIX=${APP_PREFIX}
              healthcheck:
                test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
                interval: 10s
                timeout: 5s
                retries: 5
                start_period: 30s
              networks:
                - internal

            nginx:
              image: nginx:alpine
              restart: unless-stopped
              depends_on:
                - app-blue
                - app-green
              environment:
                - ACTIVE_ENV=\${ACTIVE_ENV:-blue}
                - MCP_BACKEND=\${MCP_BACKEND:-glow-nginx:80}
                - GLOW_NGINX=\${GLOW_NGINX:-glow-nginx:80}
              volumes:
                - ./web/default.conf.template:/etc/nginx/templates/default.conf.template:ro
                - ./web/generated:/etc/nginx/conf.d/generated:rw
              networks:
                - internal

            docker-gen:
              image: jwilder/docker-gen:0.7.6
              restart: unless-stopped
              environment:
                - COMPOSE_PROJECT_NAME=\${COMPOSE_PROJECT_NAME}
              volumes:
                - /var/run/docker.sock:/tmp/docker.sock:ro
                - ./web/templates:/etc/docker-gen/templates:ro
                - ./web/generated:/etc/nginx/conf.d/generated:rw
              command: >
                -notify-sighup \${COMPOSE_PROJECT_NAME}-nginx
                -watch
                /etc/docker-gen/templates/upstreams.tmpl
                /etc/nginx/conf.d/generated/upstreams.conf
              networks:
                - internal

          networks:
            internal:
          COMPOSE
          sed -i 's/^          //' "$DEPLOY_DIR/docker-compose.yml"

      - name: Provision Traefik labels
        run: |
          # Resolve parent API domain for extra_hosts
          API_DOMAIN=""
          if [ -n "${{ inputs.api_url }}" ]; then
            API_DOMAIN=$(echo "${{ inputs.api_url }}" | sed 's|https\?://||' | sed 's|/.*||')
          fi

          CUSTOM_DOMAIN="${{ inputs.custom_domain }}"
          bash "$DEPLOY_DIR/scripts/provision.sh" deploy \
            --name "${{ inputs.deployment_id }}" \
            --instance-id "${{ inputs.instance_id }}" \
            ${API_DOMAIN:+--api-domain "$API_DOMAIN"} \
            --subdomain "${{ steps.parse-origin.outputs.subdomain }}" \
            --base-domain "${{ steps.parse-origin.outputs.base-domain }}" \
            --compose-dir "$DEPLOY_DIR" \
            --entry-service nginx \
            --entry-port 80 \
            ${CUSTOM_DOMAIN:+--custom-domain "$CUSTOM_DOMAIN"}

      - name: Pull images
        run: |
          cd "$DEPLOY_DIR"
          docker compose pull app-blue app-green 2>/dev/null || true

      - name: Deploy target environment
        run: |
          cd "$DEPLOY_DIR"
          bash scripts/deploy-target.sh "${{ needs.detect-active-environment.outputs.target-env }}"

      - name: Switch traffic
        run: |
          cd "$DEPLOY_DIR"
          bash scripts/switch-traffic.sh "${{ needs.detect-active-environment.outputs.target-env }}"

      - name: Monitor deployment
        run: |
          cd "$DEPLOY_DIR"
          bash scripts/monitor.sh "${{ needs.detect-active-environment.outputs.target-env }}" "${{ needs.detect-active-environment.outputs.active-env }}" 45

      - name: Notify LearnLoop
        if: always()
        run: |
          if [ "$JOB_STATUS" = "success" ]; then
            STATUS="running"
          else
            STATUS="failed"
          fi
          HOST=$(echo "$LEARNLOOP_API_URL" | sed 's|https\?://||' | sed 's|/.*||')
          curl -sfk -X POST "https://localhost/deploy/${{ inputs.deployment_id }}/callback" \
            -H "Host: $HOST" \
            -H "Authorization: Bearer $DEPLOYMENT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"status\": \"$STATUS\"}" || echo "Callback failed (non-fatal)"
        env:
          JOB_STATUS: ${{ job.status }}
          LEARNLOOP_API_URL: ${{ env.LEARNLOOP_API_URL }}
          DEPLOYMENT_TOKEN: ${{ env.DEPLOYMENT_TOKEN }}
