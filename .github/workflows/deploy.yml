name: Deploy (New)

on:
  workflow_dispatch:
    inputs:
      deployment_id:
        description: 'Deployment UUID from LearnLoop API'
        required: true
      origin:
        description: 'Client origin URL (e.g. https://app-glow-demo.learn-loop.org)'
        required: true
      parent_deployment_id:
        description: 'Parent API deployment UUID (for Docker network connectivity)'
        required: true
      version:
        description: 'Image version (e.g. v1.0.0 or latest)'
        required: true
        default: 'latest'
      app_prefix:
        description: 'App prefix for path-based routing (empty for root)'
        required: false
        default: ''
      campus:
        description: 'Campus display name'
        required: false
        default: 'University Name'
      provision_token:
        description: 'One-time token to claim DEPLOYMENT_TOKEN from LearnLoop'
        required: true
      api_url:
        description: 'Parent API URL (e.g. https://glow-v1.learn-loop.org)'
        required: false
        default: ''
      learnloop_api_url:
        description: 'LearnLoop API URL'
        required: false
        default: 'https://api.learn-loop.org'

permissions:
  contents: read
  packages: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: learnloopllc/glow-client

jobs:
  deploy:
    runs-on: [self-hosted, linux, x64, deploy]
    concurrency:
      group: deploy-${{ inputs.deployment_id }}
      cancel-in-progress: true
    env:
      DEPLOY_DIR: /srv/deploy/live/glow-client/${{ inputs.deployment_id }}
      COMPOSE_PROJECT_NAME: ${{ inputs.deployment_id }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          clean: true

      - name: Login GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Claim DEPLOYMENT_TOKEN from LearnLoop
        run: |
          HOST=$(echo "${{ inputs.learnloop_api_url }}" | sed 's|https\?://||' | sed 's|/.*||')
          RESP=$(curl -sfk -X POST "https://localhost/provision/claim" \
            -H "Host: $HOST" \
            -H "Content-Type: application/json" \
            -d '{"token": "${{ inputs.provision_token }}"}')
          DEPLOYMENT_TOKEN=$(echo "$RESP" | jq -r '.deployment_token')
          if [ -z "$DEPLOYMENT_TOKEN" ] || [ "$DEPLOYMENT_TOKEN" = "null" ]; then
            echo "::error::Failed to claim deployment token"
            echo "::error::Response: $RESP"
            exit 1
          fi
          # Extract credentials from provision claim
          SECRET_KEY=$(echo "$RESP" | jq -r '.secret_key // empty')

          echo "DEPLOYMENT_TOKEN=${DEPLOYMENT_TOKEN}" >> $GITHUB_ENV
          echo "LEARNLOOP_API_URL=${{ inputs.learnloop_api_url }}" >> $GITHUB_ENV
          [ -n "$SECRET_KEY" ] && echo "SECRET_KEY=${SECRET_KEY}" >> $GITHUB_ENV
          echo "Deployment token claimed successfully"

      - name: Derive auth secret
        if: env.SECRET_KEY != ''
        run: |
          AUTH_CLIENT_SECRET=$(python3 /dev/stdin "$SECRET_KEY" <<'PYEOF'
          import sys, hashlib, base64
          from cryptography.hazmat.primitives.kdf.pbkdf2 import PBKDF2HMAC
          from cryptography.hazmat.primitives import hashes
          sk = sys.argv[1]
          salt = hashlib.sha256(b"glow-auth-secret-v1").digest()
          kdf = PBKDF2HMAC(algorithm=hashes.SHA256(), length=32, salt=salt, iterations=100000)
          key = kdf.derive(sk.encode())
          print(base64.urlsafe_b64encode(key).decode().rstrip("="))
          PYEOF
          )
          echo "AUTH_CLIENT_SECRET=${AUTH_CLIENT_SECRET}" >> $GITHUB_ENV
          echo "Auth client secret derived from SECRET_KEY"

      - name: Parse subdomain from ORIGIN
        id: parse-origin
        run: |
          DOMAIN=$(echo "${{ inputs.origin }}" | sed 's|https://||' | sed 's|http://||')
          SUBDOMAIN=$(echo "$DOMAIN" | cut -d. -f1)
          BASE_DOMAIN=$(echo "$DOMAIN" | cut -d. -f2-)
          echo "subdomain=$SUBDOMAIN" >> $GITHUB_OUTPUT
          echo "base-domain=$BASE_DOMAIN" >> $GITHUB_OUTPUT
          echo "domain=$DOMAIN" >> $GITHUB_OUTPUT

      - name: Stage release
        run: |
          mkdir -p "$DEPLOY_DIR/web/templates" "$DEPLOY_DIR/web/generated" "$DEPLOY_DIR/scripts"
          cp web/default.conf.template "$DEPLOY_DIR/web/"
          cp web/templates/*.tmpl "$DEPLOY_DIR/web/templates/"
          cp web/generated/upstreams.conf "$DEPLOY_DIR/web/generated/"
          cp scripts/*.sh "$DEPLOY_DIR/scripts/"
          chmod +x "$DEPLOY_DIR/scripts/"*.sh

      - name: Generate docker-compose.yml
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:\${CLIENT_VERSION}"
          DOMAIN="${{ steps.parse-origin.outputs.domain }}"
          ORIGIN="${{ inputs.origin }}"
          APP_PREFIX="${{ inputs.app_prefix }}"
          CAMPUS="${{ inputs.campus }}"
          PARENT_NETWORK="glow-${{ inputs.parent_deployment_id }}"

          AUTH_CLIENT_SECRET="${AUTH_CLIENT_SECRET:-}"

          # Resolve parent API URL (OIDC issuer for the client)
          API_URL="${{ inputs.api_url }}"
          if [ -z "$API_URL" ]; then
            API_URL="https://${{ inputs.parent_deployment_id }}.learn-loop.org"
          fi

          cat > "$DEPLOY_DIR/docker-compose.yml" <<COMPOSE
          services:
            app-blue:
              image: "${IMAGE}"
              restart: unless-stopped
              environment:
                - HOSTNAME=0.0.0.0
                - PORT=3000
                - INTERNAL_API_BASE=http://glow-api:8000
                - AUTH_ISSUER=${API_URL}
                - AUTH_CLIENT_ID=glow-client
                - AUTH_CLIENT_SECRET=${AUTH_CLIENT_SECRET}
                - AUTH_URL=${ORIGIN}${APP_PREFIX}/api/auth
                - AUTH_SECRET=${AUTH_CLIENT_SECRET}
                - NEXT_PUBLIC_CAMPUS=${CAMPUS}
                - APP_PREFIX=${APP_PREFIX}
                - NEXT_PUBLIC_APP_PREFIX=${APP_PREFIX}
              healthcheck:
                test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
                interval: 10s
                timeout: 5s
                retries: 5
                start_period: 30s
              networks:
                - internal

            app-green:
              image: "${IMAGE}"
              restart: unless-stopped
              environment:
                - HOSTNAME=0.0.0.0
                - PORT=3000
                - INTERNAL_API_BASE=http://glow-api:8000
                - AUTH_ISSUER=${API_URL}
                - AUTH_CLIENT_ID=glow-client
                - AUTH_CLIENT_SECRET=${AUTH_CLIENT_SECRET}
                - AUTH_URL=${ORIGIN}${APP_PREFIX}/api/auth
                - AUTH_SECRET=${AUTH_CLIENT_SECRET}
                - NEXT_PUBLIC_CAMPUS=${CAMPUS}
                - APP_PREFIX=${APP_PREFIX}
                - NEXT_PUBLIC_APP_PREFIX=${APP_PREFIX}
              healthcheck:
                test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
                interval: 10s
                timeout: 5s
                retries: 5
                start_period: 30s
              networks:
                - internal

            nginx:
              image: nginx:alpine
              restart: unless-stopped
              depends_on:
                - app-blue
                - app-green
              environment:
                - ACTIVE_ENV=\${ACTIVE_ENV:-blue}
                - MCP_BACKEND=\${MCP_BACKEND:-server:8000}
              volumes:
                - ./web/default.conf.template:/etc/nginx/templates/default.conf.template:ro
                - ./web/generated:/etc/nginx/conf.d/generated:rw
              networks:
                - internal

            docker-gen:
              image: jwilder/docker-gen:0.7.6
              restart: unless-stopped
              environment:
                - COMPOSE_PROJECT_NAME=\${COMPOSE_PROJECT_NAME}
              volumes:
                - /var/run/docker.sock:/tmp/docker.sock:ro
                - ./web/templates:/etc/docker-gen/templates:ro
                - ./web/generated:/etc/nginx/conf.d/generated:rw
              command: >
                -notify-sighup \${COMPOSE_PROJECT_NAME}-nginx
                -watch
                /etc/docker-gen/templates/upstreams.tmpl
                /etc/nginx/conf.d/generated/upstreams.conf
              networks:
                - internal

          networks:
            internal:
          COMPOSE
          sed -i 's/^          //' "$DEPLOY_DIR/docker-compose.yml"

      - name: Write .env
        run: |
          cat > "$DEPLOY_DIR/.env" <<EOF
          COMPOSE_PROJECT_NAME=${{ inputs.deployment_id }}
          CLIENT_VERSION=${{ inputs.version }}
          ACTIVE_ENV=blue
          EOF
          sed -i 's/^          //' "$DEPLOY_DIR/.env"

      - name: Pull images
        run: |
          cd "$DEPLOY_DIR"
          docker compose pull app-blue app-green 2>/dev/null || true

      - name: Provision Traefik labels
        run: |
          # Resolve parent API domain for extra_hosts
          API_DOMAIN=""
          if [ -n "${{ inputs.api_url }}" ]; then
            API_DOMAIN=$(echo "${{ inputs.api_url }}" | sed 's|https\?://||' | sed 's|/.*||')
          fi

          bash "$DEPLOY_DIR/scripts/provision.sh" deploy \
            --name "${{ inputs.deployment_id }}" \
            --parent-deployment-id "${{ inputs.parent_deployment_id }}" \
            ${API_DOMAIN:+--api-domain "$API_DOMAIN"} \
            --subdomain "${{ steps.parse-origin.outputs.subdomain }}" \
            --base-domain "${{ steps.parse-origin.outputs.base-domain }}" \
            --compose-dir "$DEPLOY_DIR" \
            --entry-service nginx \
            --entry-port 80

      - name: Detect target environment
        id: env
        run: |
          cd "$DEPLOY_DIR"
          eval $(bash scripts/detect-env.sh)
          echo "active=$ACTIVE_ENV" >> "$GITHUB_OUTPUT"
          echo "target=$TARGET_ENV" >> "$GITHUB_OUTPUT"

      - name: Deploy target environment
        run: |
          cd "$DEPLOY_DIR"
          bash scripts/deploy-target.sh "${{ steps.env.outputs.target }}"

      - name: Switch traffic
        run: |
          cd "$DEPLOY_DIR"
          bash scripts/switch-traffic.sh "${{ steps.env.outputs.target }}"

      - name: Monitor deployment
        run: |
          cd "$DEPLOY_DIR"
          bash scripts/monitor.sh "${{ steps.env.outputs.target }}" "${{ steps.env.outputs.active }}" 45

      - name: Notify LearnLoop
        if: always()
        run: |
          if [ "$JOB_STATUS" = "success" ]; then
            STATUS="running"
          else
            STATUS="failed"
          fi
          HOST=$(echo "$LEARNLOOP_API_URL" | sed 's|https\?://||' | sed 's|/.*||')
          curl -sfk -X POST "https://localhost/deploy/${{ inputs.deployment_id }}/callback" \
            -H "Host: $HOST" \
            -H "Authorization: Bearer $DEPLOYMENT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"status\": \"$STATUS\"}" || echo "Callback failed (non-fatal)"
        env:
          JOB_STATUS: ${{ job.status }}
          LEARNLOOP_API_URL: ${{ env.LEARNLOOP_API_URL }}
          DEPLOYMENT_TOKEN: ${{ env.DEPLOYMENT_TOKEN }}
