name: Sync API Types

on:
  repository_dispatch:
    types: [api-release]
  workflow_dispatch:
    inputs:
      version:
        description: 'API version to sync (e.g. v0.1.0). Leave empty to sync latest.'
        required: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.DEPLOY_APP_ID }}
          private-key: ${{ secrets.DEPLOY_APP_PRIVATE_KEY }}
          owner: learnloopllc

      - name: Determine version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            VERSION="${{ github.event.client_payload.version }}"
          elif [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=$(gh release view --repo learnloopllc/glow-api --json tagName -q .tagName)
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Syncing API version: $VERSION"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Download openapi.json from release
        run: |
          gh release download "${{ steps.ver.outputs.version }}" \
            --repo learnloopllc/glow-api \
            --pattern openapi.json \
            --dir /tmp
          echo "Downloaded openapi.json for ${{ steps.ver.outputs.version }}"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Generate TypeScript types
        run: |
          npx openapi-typescript /tmp/openapi.json -o "api/${{ steps.ver.outputs.version }}.ts"
          echo "Generated api/${{ steps.ver.outputs.version }}.ts"

      - name: Regenerate barrel file
        run: node scripts/generate-api-index.cjs

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add api/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: sync api ${{ steps.ver.outputs.version }}"
            git push
          fi
