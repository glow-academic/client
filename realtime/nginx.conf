# nginx.conf

events {}

http {
  upstream nextjs { server client:3000; }
  upstream fastapi { server server:8000; }

  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  server {
    listen 80;
    server_name _;

    # Next.js pages, static & API routes
    location / {
      proxy_pass http://nextjs;
      proxy_set_header Host $host;
    }

    # FastAPI REST endpoints (if you keep /api prefix)
    location /api/ {
      proxy_pass http://fastapi;
      proxy_set_header Host $host;
    }

    # NEW: everything under /rtc/ goes to FastAPI
    location /rtc/ {
      proxy_pass http://fastapi;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 86400;            # long-lived WebRTC websockets
      proxy_send_timeout 86400;
      proxy_buffering off;
    }

    # WebRTC signalling WebSocket (matches /rtc/signaling/** first)
    location ^~ /rtc/signaling/ {
      proxy_pass http://fastapi;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_buffering off;
      proxy_read_timeout 86400;
    }

    # Socket.IO (text + WS) ------------------------------------------
    location /socket.io/ {
      proxy_pass http://fastapi;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_buffering off;
      proxy_read_timeout 86400;
    }
  }
}
