parent=keycloak
styles=css/styles.css
favIcon=/img/favicon.ico
favIconType=image/x-icon

# Icon mappings for department-scoped providers
# Keycloak determines iconClasses based on alias matching kcLogoIdP-<alias> entries
# For department-scoped providers (auth_{slug}_{auth_id}), we extract the slug
# and map it to the appropriate icon class
# Note: These entries help Keycloak provide iconClasses, but the actual icon rendering
# depends on Keycloak's icon font/CSS support for these classes
kcLogoIdP-microsoft=kc-social-icon-microsoft
kcLogoIdP-google=kc-social-icon-google
