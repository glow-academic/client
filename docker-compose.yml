# Define networks for isolation
networks:
  internal:
    driver: bridge
    internal: true
  web:
    external: ${PROD:-false}

services:
  # --------------------
  # Database Service
  # --------------------
  database:
    image: postgres:15-alpine
    env_file: .env
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
      - CLEAN_DB=${CLEAN_DB:-false}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/init.sql
      - ./database/custom-entrypoint.sh:/custom-entrypoint.sh
    command: ["/custom-entrypoint.sh"]
    ports:
      - "${DB_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal
    profiles:
      - dev
      - prod

  # --------------------
  # API Server
  # --------------------
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - DB_HOST=database
      - DOCKER_ENV=1
    volumes:
      - ./uploads:/app/uploads   # makes /app/uploads writable
    depends_on:
      database:
        condition: service_healthy
    networks:
      - internal
      - web
    # In prod, we let Traefik route /api → server
    labels:
      - "traefik.enable=${PROD:-false}"
      - "traefik.docker.network=web"

      # Public router → container
      - "traefik.http.routers.${SUBDOMAIN}-api.rule=Host(`${SUBDOMAIN}.${DOMAIN}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.${SUBDOMAIN}-api.entrypoints=websecure"
      - "traefik.http.routers.${SUBDOMAIN}-api.tls.certresolver=letsencrypt"

      # Back-end service
      - "traefik.http.services.${SUBDOMAIN}-api.loadbalancer.server.port=8000"

      - "traefik.http.middlewares.${SUBDOMAIN}-strip-api.stripprefix.prefixes=/api"
      - "traefik.http.routers.${SUBDOMAIN}-api.middlewares=${SUBDOMAIN}-strip-api"
    profiles:
      - prod
      - dev
    ports:
      - "${SERVER_PORT:-8000}:8000"

  # --------------------
  # Next.js Client
  # --------------------
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    env_file: .env
    environment:
      - DB_HOST=database
    depends_on:
      - server
      - database
    networks:
      - internal
      - web
    # In prod, Traefik serves the client at root,
    # ensuring /api goes to server instead of Next.js
    labels:
      - "traefik.enable=${PROD:-false}"
      - "traefik.docker.network=web"

      # Main site (everything except /api)
      - "traefik.http.routers.${SUBDOMAIN}-app.rule=Host(`${SUBDOMAIN}.${DOMAIN}`)"
      - "traefik.http.routers.${SUBDOMAIN}-app.entrypoints=websecure"
      - "traefik.http.routers.${SUBDOMAIN}-app.tls.certresolver=letsencrypt"
      - "traefik.http.services.${SUBDOMAIN}-app.loadbalancer.server.port=3000"

      # Higher-priority router just for Next.js static assets
      - "traefik.http.routers.${SUBDOMAIN}-static.rule=Host(`${SUBDOMAIN}.${DOMAIN}`) && PathPrefix(`/_next`)"
      - "traefik.http.routers.${SUBDOMAIN}-static.priority=11"
      - "traefik.http.routers.${SUBDOMAIN}-static.entrypoints=websecure"
      - "traefik.http.routers.${SUBDOMAIN}-static.tls.certresolver=letsencrypt"
      - "traefik.http.routers.${SUBDOMAIN}-static.service=${SUBDOMAIN}-app"
    profiles:
      - prod
      - dev
    ports:
      - "${CLIENT_PORT:-3000}:3000"

volumes:
  pgdata:
