# Define networks for isolation
networks:
  internal:
    driver: bridge
    internal: true
  public_net:               # <-- NEW: normal bridge
    driver: bridge

services:
  # --------------------
  # Redis – pub/sub bus for Socket.IO
  # --------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - internal

  # --------------------
  # WebRTC Service
  # --------------------
  webrtc:
    container_name: webrtc
    build: ./web
    profiles: ["webrtc"]          # <─── this hides the entire service
    ports:
      - "443:443"
    networks:
      - internal
      - public_net

  # --------------------
  # Database Service
  # --------------------
  database:
    container_name: database
    build:
      context: ./database
      dockerfile: Dockerfile
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
      - HISTORY_DIR=/database/history
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./client/components:/client/components  # Mount client components with write access for analytics generation
      - ./client/lib:/client/lib  # Mount client lib with write access for analytics generation
      - history-data:/database/history 
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # --------------------
  # Model Service (for Whisper + Kokoro)
  # --------------------
  model:
    container_name: model
    build: ./server/model
    profiles: ["webrtc"] 
    environment:
      - DOCKER_ENV=1
    restart: unless-stopped
    volumes:
      - model_cache:/app/cache   # Docker volume for model cache
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
      - public_net


  # --------------------
  # Volume Init Service
  # --------------------
  volume-init:
    image: busybox
    volumes:
      - uploads:/app/uploads
      - audio-data:/app/audio
      - sketch-data:/app/sketch
      - csv-data:/app/csv
    command: >
      sh -c "
        mkdir -p /app/uploads/tus_uploads &&
        chmod -R 755 /app/uploads /app/audio /app/sketch /app/csv &&
        echo 'Volume permissions initialized'
      "
    networks:
      - internal

  # --------------------
  # API Server (No contianer name, since redis will clone replicas)
  # --------------------
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      - DB_PORT=5432
      - DB_HOST=database
      - DOCKER_ENV=1
    volumes:
      - uploads:/app/uploads   # Docker volume for uploads
      - audio-data:/app/audio
      - sketch-data:/app/sketch
      - csv-data:/app/csv
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_started
      volume-init:
        condition: service_completed_successfully
    deploy:
      replicas: ${SERVER_REPLICAS:-1}   # (now overridable) 
    command: >
      gunicorn app.main:app -w 1 -k uvicorn.workers.UvicornWorker -b 0.0.0.0:8000 --log-level info
    networks:
      - internal
      - public_net
  # --------------------
  # Unit Testing
  # --------------------
  server-unit:
    build:
      context: ./server
      target: tester
    profiles: ["test"]
    command: ["true"]

  # --------------------
  # Next.js Client
  # --------------------
  client:
    container_name: client
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        DB_USER: ${DB_USER}
        DB_PASSWORD: ${DB_PASSWORD}
        DB_NAME: ${DB_NAME}
        DB_PORT: 5432 # since we are running internally
        DB_HOST: database
        AUTH_URL: ${AUTH_URL}
        AUTH_SECRET: ${AUTH_SECRET}
        AUTH_MICROSOFT_ENTRA_ID_ID: ${AUTH_MICROSOFT_ENTRA_ID_ID}
        AUTH_MICROSOFT_ENTRA_ID_SECRET: ${AUTH_MICROSOFT_ENTRA_ID_SECRET}
        NEXT_PUBLIC_BASE_PATH: ${APP_PREFIX}
        NEXT_PUBLIC_CAMPUS: ${NEXT_PUBLIC_CAMPUS}
        NEXT_PUBLIC_CAMPUS_EMAIL: ${NEXT_PUBLIC_CAMPUS_EMAIL}
        INTERNAL_API_BASE: http://server:8000
        INTERNAL_MODELS_BASE: http://model:8080

    environment:
      - DB_PORT=5432
      - DB_HOST=database
      - HOSTNAME=0.0.0.0
      - PORT=3000
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 45s   # (see step 3)
    depends_on:
      database:
        condition: service_healthy
      server:
        condition: service_healthy
    networks:
      - internal
      - public_net
  # --------------------
  # Unit Testing
  # --------------------
  client-unit:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: tester
    profiles: ["test"]
    command: ["true"]

  # --------------------
  # E2E Testing Service
  # --------------------
  testing:
    container_name: testing
    build: ./testing
    environment:
      - CYPRESS_baseUrl=http://client:3000
      - CYPRESS_apiUrl=http://server:8000
      - DB_PORT=5432
      - DB_HOST=database
      - CI=1
    depends_on:
      database:
        condition: service_healthy
      client:
        condition: service_healthy
      server:
        condition: service_healthy
    networks:
      - internal
    volumes:
      - cypress_data:/e2e/cypress/screenshots
    profiles:
      - test

  # --------------------
  # Nginx Service
  # --------------------
  nginx:
    image: nginx:1.25
    container_name: nginx
    volumes:
      - ./web/nginx.conf.template:/etc/nginx/nginx.conf.template:ro
    # 1) run envsubst, 2) start nginx
    entrypoint:
      - sh
      - -c
      - |
        # only replace ${APP_PREFIX} in the template:
        envsubst '${APP_PREFIX}' \
          < /etc/nginx/nginx.conf.template \
          > /etc/nginx/nginx.conf

        exec nginx -g 'daemon off;'
    ports:
      - "${CLIENT_PORT}:80"
    depends_on:
      - client
      - server
    networks:
      - internal
      - public_net

volumes:
  pgdata:
  audio-data:
  sketch-data:
  history-data:
  csv-data:
  uploads:
  model_cache:
  cypress_data:
