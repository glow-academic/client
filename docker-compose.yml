version: '3.8'

networks:
  web:
    external: true

services:
  database:
    image: postgres:15-alpine
    container_name: postgres_db
    restart: always
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "${DB_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: fastapi_server
    depends_on:
      database:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "${SERVER_PORT}:8000"

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: nextjs_client
    depends_on:
      - server
    env_file:
      - .env
    ports:
      - "${CLIENT_PORT}:3000"
    # networks:
    #   - web
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.docker.network=web"
    #   - "traefik.http.routers.glow.rule=Host(`api.ashoksaravanan.com`) && PathPrefix(`/glow`)"
    #   - "traefik.http.routers.glow.entrypoints=websecure"
    #   - "traefik.http.routers.glow.tls.certresolver=letsencrypt"
    #   - "traefik.http.middlewares.strip-glow.stripprefix.prefixes=/glow"
    #   - "traefik.http.routers.glow.middlewares=strip-glow"
    #   - "traefik.http.services.glow.loadbalancer.server.port=3000"

volumes:
  pgdata:
