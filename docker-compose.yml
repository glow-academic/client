version: '3.8'

networks:
  web:
    external: true

services:
  db:
    image: postgres:15-alpine
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER:     myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB:       mydb
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: fastapi_server
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://myuser:mypassword@db:5432/mydb
    ports:
      - "8000:8000"

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: nextjs_client
    depends_on:
      - server
    environment:
      - DATABASE_URL=postgresql://myuser:mypassword@db:5432/mydb
    ports:
      - "3000:3000"

    labels: # TEMPORARY, for deployment
      - "traefik.enable=true"
      - "traefik.docker.network=web"
      - "traefik.http.routers.glow.rule=Host(`api.ashoksaravanan.com`) && PathPrefix(`/glow`)"
      - "traefik.http.routers.glow.entrypoints=web"
      - "traefik.http.routers.glow.middlewares=strip-glow"
      - "traefik.http.services.glow-client.loadbalancer.server.port=3000"
      - "traefik.http.middlewares.strip-glow.stripprefix.prefixes=/glow"

volumes:
  pgdata:
