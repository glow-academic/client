# Define networks for isolation
networks:
  internal:
    driver: bridge
    internal: true
  public_net:
    driver: bridge

services:
  # --------------------
  # Redis – pub/sub bus for Socket.IO
  # --------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - internal

  # --------------------
  # Database Service
  # --------------------
  database:
    build:
      context: ./database
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
      - HISTORY_DIR=/database/history
    volumes:
      - pgdata:/var/lib/postgresql/data
      - history:/database/history 
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal


  # --------------------
  # Volume Init Service
  # --------------------
  volume-init:
    image: busybox:1.36   # tiny, has cp ‑a
    volumes:
      # writable named volumes
      - uploads:/app/uploads
      - csv:/app/csv
      - history:/app/history

      # read‑only seed folders that live in your repo
      - ./uploads:/seed/uploads:ro
      - ./history:/seed/history:ro
      - ./csv:/seed/csv:ro
    command: >
      sh -c '
        set -e

        # Copy uploads if the volume is still empty
        if [ -z "$(ls -A /app/uploads 2>/dev/null)" ]; then
          echo "[init] Seeding uploads volume…"
          cp -a /seed/uploads/. /app/uploads/
        fi

        # Copy history if the volume is still empty
        if [ -z "$(ls -A /app/history 2>/dev/null)" ]; then
          echo "[init] Seeding history volume…"
          cp -a /seed/history/. /app/history/
        fi

        # Copy csv if the volume is still empty
        if [ -z "$(ls -A /app/csv 2>/dev/null)" ]; then
          echo "[init] Seeding csv volume…"
          cp -a /seed/csv/. /app/csv/
        fi

        # Always ensure perms for FastAPI UID/GID 1001
        chown -R 1001:1001 /app/uploads /app/history /app/csv
        chmod -R 775 /app/uploads /app/history /app/csv

        echo "[init] Volume permissions & seeds ready."
      '
    networks:
      - internal

  # --------------------
  # API Server (No contianer name, since redis will clone replicas)
  # --------------------
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
      args:
        APP_UID: 1001
        APP_GID: 1001
    env_file:
      - .env
    environment:
      - DB_PORT=5432
      - DB_HOST=database
      - DOCKER_ENV=1
      - APP_PREFIX=${APP_PREFIX}
      - INTERNAL_API_BASE=http://server:8000
    volumes:
      - uploads:/app/uploads   # Docker volume for uploads
      - csv:/app/csv
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_started
      volume-init:
        condition: service_completed_successfully
    deploy:
      replicas: ${SERVER_REPLICAS:-1}   # (now overridable) 
    command: >
      gunicorn app.main:app -w 1 -k uvicorn.workers.UvicornWorker -b 0.0.0.0:8000 --log-level info
    networks:
      - internal
      - public_net
  # --------------------
  # Unit Testing
  # --------------------
  server-unit:
    build:
      context: ./server
      target: tester
    profiles: ["test"]
    command: ["true"]

  # --------------------
  # Next.js Client
  # --------------------
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        DB_USER: ${DB_USER}
        DB_PASSWORD: ${DB_PASSWORD}
        DB_NAME: ${DB_NAME}
        DB_PORT: 5432 # since we are running internally
        DB_HOST: database
        AUTH_URL: ${ORIGIN}${APP_PREFIX}/api/auth
        AUTH_SECRET: ${AUTH_SECRET}
        AUTH_MICROSOFT_ENTRA_ID_ID: ${AUTH_MICROSOFT_ENTRA_ID_ID}
        AUTH_MICROSOFT_ENTRA_ID_SECRET: ${AUTH_MICROSOFT_ENTRA_ID_SECRET}
        NEXT_PUBLIC_CAMPUS: ${NEXT_PUBLIC_CAMPUS}
        NEXT_PUBLIC_CAMPUS_EMAIL: ${NEXT_PUBLIC_CAMPUS_EMAIL}
        INTERNAL_API_BASE: http://server:8000
        APP_PREFIX: ${APP_PREFIX}
        NEXT_PUBLIC_APP_PREFIX: ${APP_PREFIX}
    env_file:
      - .env
    environment:
      - DB_HOST=database
      - DB_PORT=5432
      - HOSTNAME=0.0.0.0
      - PORT=3000
      - INTERNAL_API_BASE=http://server:8000
      - APP_PREFIX=${APP_PREFIX}
      - NEXT_PUBLIC_APP_PREFIX=${APP_PREFIX}
      - ORIGIN=${ORIGIN}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 45s   # (see step 3)
    depends_on:
      database:
        condition: service_healthy
      server:
        condition: service_healthy
    networks:
      - internal
      - public_net
  # --------------------
  # Unit Testing
  # --------------------
  client-unit:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: tester
    profiles: ["test"]
    command: ["true"]

  # --------------------
  # E2E Testing Service
  # --------------------
  testing:
    build: ./testing
    env_file:
      - .env
    environment:
      - CYPRESS_baseUrl=http://client:3000
      - CYPRESS_apiUrl=http://server:8000
      - DB_PORT=5432
      - DB_HOST=database
      - INTERNAL_API_BASE=http://server:8000
      - CI=1
    depends_on:
      database:
        condition: service_healthy
      client:
        condition: service_healthy
      server:
        condition: service_healthy
    networks:
      - internal
    volumes:
      - cypress:/e2e/cypress/screenshots
    profiles:
      - test

  # --------------------
  # Nginx Service
  # --------------------
  nginx:
    image: nginx:1.25
    env_file:
      - .env
    volumes:
      - ./web/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./web/generated:/etc/nginx/conf.d/generated:rw
    ports:
      - "${CLIENT_PORT}:80"
    depends_on:
      - client
      - server
    networks:
      - internal
      - public_net

  docker-gen:
    image: jwilder/docker-gen:0.7.6
    container_name: glow-docker-gen
    restart: unless-stopped
    environment:
    - COMPOSE_PROJECT_NAME=${COMPOSE_PROJECT_NAME}
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - ./web/templates:/etc/docker-gen/templates:ro
      - ./web/generated:/etc/nginx/conf.d/generated:rw
    command: >
      -notify-sighup glow-nginx
      -watch
      /etc/docker-gen/templates/api_socketio.upstream.tmpl
      /etc/nginx/conf.d/generated/api_socketio.upstream.conf
    networks:
      - internal
      - public_net

volumes:
  pgdata:
  history:
  csv:
  uploads:
  cypress:
