# Define networks for isolation
networks:
  internal:
    driver: bridge
    internal: true
  web:
    external: ${PROD:-false}

services:
  # --------------------
  # Database Service
  # --------------------
  database:
    build:
      context: ./database
      dockerfile: Dockerfile
      target: production
    env_file: .env
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
      - CLEAN_DB=${CLEAN_DB:-false}
      - DB_HOST=localhost
      - DB_PORT=5432
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - INIT_SQL=init.sql
      - INIT_DIR=init
      - HISTORY_DIR=/database/history
      - MIGRATIONS_DIR=/database/migrations
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/history:/database/history
      - ./database/migrations:/database/migrations
    ports:
      - "${DB_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal
    profiles:
      - dev
      - prod

  # --------------------
  # API Server
  # --------------------
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: production
    env_file: .env
    environment:
      - DB_HOST=database
      - DOCKER_ENV=1
    volumes:
      - ./uploads:/app/uploads   # makes /app/uploads writable
    depends_on:
      database:
        condition: service_healthy
    networks:
      - internal
      - web
    # In prod, we let Traefik route /server → server
    labels:
      - "traefik.enable=${PROD:-false}"
      - "traefik.docker.network=web"

      # Public router → container
      - "traefik.http.routers.${SUBDOMAIN}-server.rule=Host(`${SUBDOMAIN}.${DOMAIN}`) && (PathPrefix(`/server`) || PathPrefix(`/documents`))"
      - "traefik.http.routers.${SUBDOMAIN}-server.entrypoints=websecure"
      - "traefik.http.routers.${SUBDOMAIN}-server.tls.certresolver=letsencrypt"

      # Back-end service
      - "traefik.http.services.${SUBDOMAIN}-server.loadbalancer.server.port=8000"

      # Strip prefix middleware - only strip /server, not /documents
      - "traefik.http.middlewares.${SUBDOMAIN}-strip-server.stripprefix.prefixes=/server"
      - "traefik.http.middlewares.${SUBDOMAIN}-strip-server.stripprefix.forceSlash=false"
      - "traefik.http.routers.${SUBDOMAIN}-server.middlewares=${SUBDOMAIN}-strip-server@docker"
    profiles:
      - prod
      - dev
    ports:
      - "${SERVER_PORT:-8000}:8000"

  # --------------------
  # Next.js Client
  # --------------------
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: production
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        DB_USER: ${DB_USER}
        DB_PASSWORD: ${DB_PASSWORD}
        DB_NAME: ${DB_NAME}
        DB_PORT: ${DB_PORT}
        DB_HOST: database
        AUTH_SECRET: ${AUTH_SECRET}
        AUTH_MICROSOFT_ENTRA_ID_ID: ${AUTH_MICROSOFT_ENTRA_ID_ID}
        AUTH_MICROSOFT_ENTRA_ID_SECRET: ${AUTH_MICROSOFT_ENTRA_ID_SECRET}
    env_file: .env
    environment:
      - DB_HOST=database
    depends_on:
      - server
      - database
    networks:
      - internal
      - web
    # In prod, Traefik serves the client at root,
    # ensuring /server goes to server instead of Next.js
    labels:
      - "traefik.enable=${PROD:-false}"
      - "traefik.docker.network=web"

      # Main site (everything except /server)
      - "traefik.http.routers.${SUBDOMAIN}-app.rule=Host(`${SUBDOMAIN}.${DOMAIN}`)"
      - "traefik.http.routers.${SUBDOMAIN}-app.entrypoints=websecure"
      - "traefik.http.routers.${SUBDOMAIN}-app.tls.certresolver=letsencrypt"
      - "traefik.http.services.${SUBDOMAIN}-app.loadbalancer.server.port=3000"

      # Higher-priority router just for Next.js static assets
      - "traefik.http.routers.${SUBDOMAIN}-static.rule=Host(`${SUBDOMAIN}.${DOMAIN}`) && PathPrefix(`/_next`)"
      - "traefik.http.routers.${SUBDOMAIN}-static.priority=11"
      - "traefik.http.routers.${SUBDOMAIN}-static.entrypoints=websecure"
      - "traefik.http.routers.${SUBDOMAIN}-static.tls.certresolver=letsencrypt"
      - "traefik.http.routers.${SUBDOMAIN}-static.service=${SUBDOMAIN}-app"
    profiles:
      - prod
      - dev
    ports:
      - "${CLIENT_PORT:-3000}:3000"

  # --------------------
  # Testing Services (for CI/CD)
  # --------------------
  
  # Database E2E Testing
  database-test:
    build:
      context: ./database
      dockerfile: Dockerfile
      target: cypress-test
    env_file: .env
    environment:
      - DB_HOST=database
      - DB_PORT=5432
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - CYPRESS_baseUrl=http://client:3000
      - CYPRESS_apiUrl=http://server:8000
    depends_on:
      database:
        condition: service_healthy
      client:
        condition: service_started
      server:
        condition: service_started
    networks:
      - internal
    profiles:
      - test
    command: ["yarn", "test"]

  # Client Testing
  client-test:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: test
      args:
        DB_USER: ${DB_USER}
        DB_PASSWORD: ${DB_PASSWORD}
        DB_NAME: ${DB_NAME}
        DB_PORT: ${DB_PORT}
        DB_HOST: database
    env_file: .env
    depends_on:
      database:
        condition: service_healthy
    networks:
      - internal
    profiles:
      - test

  # Server Testing
  server-test:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: test
    env_file: .env
    environment:
      - DB_HOST=database
    depends_on:
      database:
        condition: service_healthy
    networks:
      - internal
    profiles:
      - test

volumes:
  pgdata:
