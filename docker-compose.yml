# Define networks for isolation
networks:
  internal:
    driver: bridge
    internal: true
  public_net:               # <-- NEW: normal bridge
    driver: bridge

services:
  # --------------------
  # Redis – pub/sub bus for Socket.IO
  # --------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - internal

  # --------------------
  # Database Service
  # --------------------
  database:
    container_name: glow-database
    build:
      context: ./database
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
      - CLEAN_DB=${CLEAN_DB:-true}
      - HISTORY_DIR=/database/history
      # Required for model generation script
      - SECRET_KEY=${SECRET_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./client/components:/client/components  # Mount client components with write access for analytics generation
      - history-data:/database/history 
    ports:
      - "${DB_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # --------------------
  # Model Service (for Whisper + Kokoro)
  # --------------------
  model:
    container_name: glow-model
    build: ./server/model
    env_file: .env
    environment:
      - DOCKER_ENV=1
    restart: unless-stopped
    command: ["/usr/bin/python3.11", "-m", "gunicorn", "app.main:app", "-k", "uvicorn.workers.UvicornWorker", "-w", "1", "--threads", "8", "-b", "0.0.0.0:8080", "--log-level", "info"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # --------------------
  # API Server
  # --------------------
  server:
    # container_name: glow-server
    build:
      context: ./server
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - DB_HOST=database
      - DOCKER_ENV=1
      - REDIS_URL=redis://redis:6379/0   # ← used by app.main (see diff below)
    volumes:
      - uploads-data:/app/uploads   # makes /app/uploads writable
      - audio-data:/app/audio
      - sketch-data:/app/sketch
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_started
    deploy:
      replicas: 3            # ← scale horizontally
    command: >
      gunicorn app.main:app -w 1 -k uvicorn.workers.UvicornWorker -b 0.0.0.0:8000 --log-level info
    networks:
      - internal
      - public_net

  # --------------------
  # Next.js Client
  # --------------------
  client:
    container_name: glow-client
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        DB_USER: ${DB_USER}
        DB_PASSWORD: ${DB_PASSWORD}
        DB_NAME: ${DB_NAME}
        DB_PORT: ${DB_PORT}
        DB_HOST: database
        AUTH_URL: ${AUTH_URL}
        AUTH_SECRET: ${AUTH_SECRET}
        AUTH_MICROSOFT_ENTRA_ID_ID: ${AUTH_MICROSOFT_ENTRA_ID_ID}
        AUTH_MICROSOFT_ENTRA_ID_SECRET: ${AUTH_MICROSOFT_ENTRA_ID_SECRET}
    env_file: .env
    environment:
      - DB_HOST=database
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      database:
        condition: service_healthy
      server:
        condition: service_healthy
    networks:
      - internal
      - public_net

  # --------------------
  # E2E Testing Service
  # --------------------
  testing:
    container_name: glow-testing
    build:
      context: ./database
      dockerfile: Dockerfile.cypress
    environment:
      # Cypress configuration
      - CYPRESS_baseUrl=http://client:3000
      - CYPRESS_apiUrl=http://server:8000
      # Database connection for Cypress tasks
      - DB_HOST=database
      - DB_PORT=5432
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      # CI environment for headless mode
      - CI=1
    depends_on:
      database:
        condition: service_healthy
      client:
        condition: service_started
      server:
        condition: service_started
    networks:
      - internal
    volumes:
      # Mount test results and screenshots
      - ./database/cypress/screenshots:/e2e/cypress/screenshots
      - ./database/cypress/videos:/e2e/cypress/videos
    profiles:
      - test
    # Use healthcheck to ensure services are ready before running tests
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://client:3000 && curl -f http://server:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # --------------------
  # Nginx Service
  # --------------------
  nginx:
    image: nginx:1.25
    container_name: glow-nginx
    volumes:
      - ./web/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      client:
        condition: service_started
      server:
        condition: service_healthy
    ports:
      - "${CLIENT_PORT:-3000}:80"
    networks:
      - internal        # to reach client+server
      - public_net      # to be reachable from outside

volumes:
  pgdata:
  uploads-data:
  audio-data:
  sketch-data:
  history-data:

