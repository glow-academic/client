# Define networks for isolation
networks:
  internal:
    driver: bridge
    internal: true

services:
  # --------------------
  # Database Service
  # --------------------
  database:
    build:
      context: ./database
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
      - CLEAN_DB=${CLEAN_DB:-true}
      - HISTORY_DIR=/database/history
      # Required for model generation script
      - SECRET_KEY=${SECRET_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/history:/database/history
      - ./client/components:/client/components  # Mount client components with write access for analytics generation
    ports:
      - "${DB_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # --------------------
  # API Server
  # --------------------
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - DB_HOST=database
      - DOCKER_ENV=1
    volumes:
      - ./uploads:/app/uploads   # makes /app/uploads writable
    depends_on:
      database:
        condition: service_healthy
    networks:
      - internal
    ports:
      - "${SERVER_PORT:-8000}:8000"

  # --------------------
  # Next.js Client
  # --------------------
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        DB_USER: ${DB_USER}
        DB_PASSWORD: ${DB_PASSWORD}
        DB_NAME: ${DB_NAME}
        DB_PORT: ${DB_PORT}
        DB_HOST: database
        AUTH_URL: ${AUTH_URL}
        AUTH_SECRET: ${AUTH_SECRET}
        AUTH_MICROSOFT_ENTRA_ID_ID: ${AUTH_MICROSOFT_ENTRA_ID_ID}
        AUTH_MICROSOFT_ENTRA_ID_SECRET: ${AUTH_MICROSOFT_ENTRA_ID_SECRET}
    env_file: .env
    environment:
      - DB_HOST=database
    depends_on:
      database:
        condition: service_healthy
      server:
        condition: service_started
    networks:
      - internal
    ports:
      - "${CLIENT_PORT:-3000}:3000"

  # --------------------
  # E2E Testing Service
  # --------------------
  testing:
    build:
      context: ./database
      dockerfile: Dockerfile.cypress
    environment:
      # Cypress configuration
      - CYPRESS_baseUrl=http://client:3000
      - CYPRESS_apiUrl=http://server:8000
      # Database connection for Cypress tasks
      - DB_HOST=database
      - DB_PORT=5432
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      # CI environment for headless mode
      - CI=1
    depends_on:
      database:
        condition: service_healthy
      client:
        condition: service_started
      server:
        condition: service_started
    networks:
      - internal
    volumes:
      # Mount test results and screenshots
      - ./database/cypress/screenshots:/e2e/cypress/screenshots
      - ./database/cypress/videos:/e2e/cypress/videos
    profiles:
      - test
    # Use healthcheck to ensure services are ready before running tests
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://client:3000 && curl -f http://server:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s


  # --------------------
  # Nginx Service
  # --------------------
  nginx:
    image: nginx:1.27-alpine
    ports: ["80:80"]         # add 443 + certbot later
    volumes:
      - ./realtime/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on: [client, server]
    networks:
      - internal

  # --------------------
  # Realtime Services (TURN/STUN)
  # --------------------
  realtime:
    image: coturn/coturn:4.6
    container_name: glow-realtime
    command:
      - --log-file=stdout
      - --no-dtls
      - --no-tls
      - --lt-cred-mech
      - --realm=${TURN_REALM:-example.com}
      - --user=${TURN_USERNAME:-webrtc}:${TURN_PASS:-changeMe}
      - --external-ip=${TURN_PUBLIC_IP:-127.0.0.1}
      - --listening-port=3478
      - --min-port=49160
      - --max-port=49200
      - --verbose
      - --fingerprint
      - --mobility
    ports:
      # STUN / TURN discovery (UDP + TCP 3478)
      - "3478:3478/udp"
      - "3478:3478/tcp"
      # Relay ports (UDP only is usually enough)
      - "49160-49200:49160-49200/udp"
    environment:
      - TURN_PUBLIC_IP=${TURN_PUBLIC_IP:-127.0.0.1}
      - TURN_REALM=${TURN_REALM:-example.com}
      - TURN_USERNAME=${TURN_USERNAME:-webrtc}
      - TURN_PASS=${TURN_PASS:-changeMe}
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "nc -z -u localhost 3478 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  pgdata:
