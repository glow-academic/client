# Define networks for isolation
networks:
  internal:
    driver: bridge
    internal: true
  public_net:               # <-- NEW: normal bridge
    driver: bridge

services:
  # --------------------
  # Database Service
  # --------------------
  database:
    container_name: glow-database
    build:
      context: ./database
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
      - CLEAN_DB=${CLEAN_DB:-true}
      - HISTORY_DIR=/database/history
      # Required for model generation script
      - SECRET_KEY=${SECRET_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./client/components:/client/components  # Mount client components with write access for analytics generation
      - history-data:/database/history 
    ports:
      - "${DB_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # --------------------
  # API Server
  # --------------------
  server:
    container_name: glow-server
    build:
      context: ./server
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - DB_HOST=database
      - DOCKER_ENV=1
    volumes:
      - uploads-data:/app/uploads   # makes /app/uploads writable
      - whisper-cache:/app/cache/whisper_models
    depends_on:
      database:
        condition: service_healthy
    networks:
      - internal
      - public_net
    ports:
      - "${SERVER_PORT:-8000}:8000"

  # --------------------
  # Next.js Client
  # --------------------
  client:
    container_name: glow-client
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        DB_USER: ${DB_USER}
        DB_PASSWORD: ${DB_PASSWORD}
        DB_NAME: ${DB_NAME}
        DB_PORT: ${DB_PORT}
        DB_HOST: database
        AUTH_URL: ${AUTH_URL}
        AUTH_SECRET: ${AUTH_SECRET}
        AUTH_MICROSOFT_ENTRA_ID_ID: ${AUTH_MICROSOFT_ENTRA_ID_ID}
        AUTH_MICROSOFT_ENTRA_ID_SECRET: ${AUTH_MICROSOFT_ENTRA_ID_SECRET}
    env_file: .env
    environment:
      - DB_HOST=database
    depends_on:
      database:
        condition: service_healthy
      server:
        condition: service_started
    networks:
      - internal
      - public_net
    ports:
      - "${CLIENT_PORT:-3000}:3000"

  # --------------------
  # E2E Testing Service
  # --------------------
  testing:
    container_name: glow-testing
    build:
      context: ./database
      dockerfile: Dockerfile.cypress
    environment:
      # Cypress configuration
      - CYPRESS_baseUrl=http://client:3000
      - CYPRESS_apiUrl=http://server:8000
      # Database connection for Cypress tasks
      - DB_HOST=database
      - DB_PORT=5432
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      # CI environment for headless mode
      - CI=1
    depends_on:
      database:
        condition: service_healthy
      client:
        condition: service_started
      server:
        condition: service_started
    networks:
      - internal
    volumes:
      # Mount test results and screenshots
      - ./database/cypress/screenshots:/e2e/cypress/screenshots
      - ./database/cypress/videos:/e2e/cypress/videos
    profiles:
      - test
    # Use healthcheck to ensure services are ready before running tests
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://client:3000 && curl -f http://server:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # --------------------
  # Realtime Services (TURN/STUN)
  # --------------------
  realtime:
    build: ./realtime          # <-- NEW: build the tiny wrapper image
    container_name: glow-realtime
    restart: unless-stopped

    # Advertise TURN on both UDP & TCP + relay port range
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "49160-49200:49160-49200/udp"
      - "49160-49200:49160-49200/tcp"

    environment:
      # Public IP or hostname that browsers on the Internet must dial
      - TURN_PUBLIC_IP=${TURN_PUBLIC_IP}
      # Usual auth / realm values (already in your .env)
      - TURN_REALM=${TURN_REALM:-localhost}
      - TURN_USERNAME=${TURN_USERNAME:-localuser}
      - TURN_PASSWORD=${TURN_PASSWORD:-localpass}

    networks:
      internal:       # let API / Next.js containers reach it at 'realtime:3478'
      public_net:     # route traffic from outside world

volumes:
  pgdata:
  uploads-data:
  history-data:
  whisper-cache:
