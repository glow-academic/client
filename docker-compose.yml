# Define networks for isolation
networks:
  internal:
    driver: bridge
    internal: true
  public_net:
    driver: bridge

services:
  # --------------------
  # Redis – pub/sub bus for Socket.IO
  # --------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - internal

  # --------------------
  # Database Service
  # --------------------
  # DB_OPERATION environment variable (optional, defaults to empty/unset):
  #   - RESTORE: Restore from latest backup in history volume (must be explicitly set)
  #   - "" (empty string) OR unset: Skip initialization, use existing database (default behavior)
  #   - seed_*.sql: Clean database and load specified seed file from seeds/ directory
  database:
    build:
      context: ./database
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
      - HISTORY_DIR=/database/history
      # DB_OPERATION can be set via .env file or docker run -e DB_OPERATION=...
    volumes:
      - pgdata:/var/lib/postgresql/data
      - history:/database/history 
    depends_on:
      volume-init:
        condition: service_completed_successfully
    healthcheck:
      # Check PostgreSQL readiness AND that restore/init scripts completed
      # The restore script creates /var/lib/postgresql/data/.restore_complete when done
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME} && (test -f /var/lib/postgresql/data/.restore_complete || psql -U ${DB_USER} -d ${DB_NAME} -tc 'SELECT 1' >/dev/null 2>&1)"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - internal

  # --------------------
  # Keycloak
  # --------------------
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    restart: unless-stopped
    command: ["start-dev"] # switch to "start" + TLS in real prod
    environment:
      # Admin bootstrap (Keycloak 26.0 uses KC_BOOTSTRAP_* instead of KEYCLOAK_*)
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}

      # DB connection (uses existing database service, keycloak schema in same database)
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://database:5432/${DB_NAME}?currentSchema=keycloak
      KC_DB_USERNAME: ${DB_USER}
      KC_DB_PASSWORD: ${DB_PASSWORD}
      KC_DB_SCHEMA: keycloak

      # IMPORTANT: run behind nginx at ${APP_PREFIX}/auth
      KC_PROXY: edge
      KC_HTTP_ENABLED: "true"
      KC_HTTP_RELATIVE_PATH: ${APP_PREFIX}/auth

      # Tell Keycloak its public URL (Keycloak 26.0 uses KC_HOSTNAME instead of KC_HOSTNAME_URL)
      KC_HOSTNAME: ${ORIGIN}${APP_PREFIX}/auth

      # Less strict for local dev
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_BACKCHANNEL: "false"
      
      # Enable health endpoints for readiness checks
      KC_HEALTH_ENABLED: "true"
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      # Keycloak exposes health endpoint at /health/ready but container has no wget/curl
      # Check management port 9000 instead (always available when Keycloak is ready)
      # Use /dev/tcp to check if port is listening (works in bash/sh)
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 2>/dev/null && exec 3<&- && exec 3>&- || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 45s
    networks:
      - internal
      - public_net

  # --------------------
  # PgBouncer - Connection Pooler (Session Mode for Prepared Statements)
  # --------------------
  pgbouncer:
    image: edoburu/pgbouncer:latest
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgres://${DB_USER}:${DB_PASSWORD}@database:5432/${DB_NAME}
      - POOL_MODE=session
      - MAX_CLIENT_CONN=1000
      - DEFAULT_POOL_SIZE=25
      - MIN_POOL_SIZE=5
      - RESERVE_POOL_SIZE=5
      - RESERVE_POOL_TIMEOUT=3
      - MAX_DB_CONNECTIONS=100
      - SERVER_IDLE_TIMEOUT=600
      - AUTH_TYPE=scram-sha-256
    depends_on:
      database:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "pgrep", "pgbouncer"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------
  # Volume Init Service
  # --------------------
  volume-init:
    image: busybox:1.36   # tiny, has cp ‑a
    volumes:
      # writable named volumes
      - uploads:/app/uploads
      - history:/app/history

      # read‑only seed folders that live in your repo
      - ./uploads:/seed/uploads:ro
      - ./history:/seed/history:ro
    command: >
      sh -c '
        set -e

        # Copy uploads if the volume is still empty
        if [ -z "$$(ls -A /app/uploads 2>/dev/null)" ]; then
          echo "[init] Seeding uploads volume…"
          # Only copy if source directory exists and has content
          if [ -d "/seed/uploads" ] && [ -n "$$(ls -A /seed/uploads 2>/dev/null)" ]; then
            cp -a /seed/uploads/. /app/uploads/
          fi
        fi

        # Copy history if the volume is still empty
        if [ -z "$$(ls -A /app/history 2>/dev/null)" ]; then
          echo "[init] Seeding history volume…"
          # Only copy if source directory exists and has content
          if [ -d "/seed/history" ] && [ -n "$$(ls -A /seed/history 2>/dev/null)" ]; then
            cp -a /seed/history/. /app/history/
          fi
        fi

        # Always ensure perms for FastAPI UID/GID 1001
        chown -R 1001:1001 /app/uploads /app/history
        chmod -R 775 /app/uploads /app/history

        echo "[init] Volume permissions & seeds ready."
      '
    networks:
      - internal

  # --------------------
  # API Server (No contianer name, since redis will clone replicas)
  # --------------------
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
      args:
        APP_UID: 1001
        APP_GID: 1001
    env_file:
      - .env
    environment:
      - DB_PORT=5432
      - DB_HOST=pgbouncer
      - PGPOOL_MODE=session
      - DOCKER_ENV=1
      - APP_PREFIX=${APP_PREFIX}
      - INTERNAL_API_BASE=http://server:8000
      - REDIS_URL=redis://redis:6379
      - KEYCLOAK_INTERNAL_URL=http://keycloak:8080
    volumes:
      - uploads:/app/uploads   # Docker volume for uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      keycloak:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_started
      volume-init:
        condition: service_completed_successfully
    command: >
      gunicorn app.main:app -w 1 -k uvicorn.workers.UvicornWorker -b 0.0.0.0:8000 --log-level info
    networks:
      - internal
      - public_net
  # --------------------
  # Notify Service - triggers Keycloak sync and periodic health/metrics logging
  # --------------------
  notify:
    build:
      context: ./notify
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - SERVER_URL=http://server:8000
      - APP_PREFIX=${APP_PREFIX}
      - INTERVAL=60
      - SYNC_RETRIES=15
      - SYNC_INITIAL_DELAY=15
      - HEALTH_RETRIES=3
      - METRICS_RETRIES=3
      - WAIT_MAX_RETRIES=30
      - WAIT_DELAY=2
    depends_on:
      server:
        condition: service_healthy
    networks:
      - internal

  # --------------------
  # Next.js Client
  # --------------------
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        AUTH_URL: ${ORIGIN}${APP_PREFIX}/api/auth
        AUTH_SECRET: ${AUTH_SECRET}
        AUTH_MICROSOFT_ENTRA_ID_ID: ${AUTH_MICROSOFT_ENTRA_ID_ID}
        AUTH_MICROSOFT_ENTRA_ID_SECRET: ${AUTH_MICROSOFT_ENTRA_ID_SECRET}
        NEXT_PUBLIC_CAMPUS: ${NEXT_PUBLIC_CAMPUS}
        INTERNAL_API_BASE: http://server:8000
        APP_PREFIX: ${APP_PREFIX}
        NEXT_PUBLIC_APP_PREFIX: ${APP_PREFIX}
        KEYCLOAK_PUBLIC_URL: ${ORIGIN}${APP_PREFIX}/auth
        NEXT_PUBLIC_KEYCLOAK_URL: ${ORIGIN}${APP_PREFIX}/auth
        AUTH_KEYCLOAK_ID: ${AUTH_KEYCLOAK_ID:-glow-client}
        NEXT_PUBLIC_AUTH_KEYCLOAK_ID: ${AUTH_KEYCLOAK_ID:-glow-client}
    env_file:
      - .env
    environment:
      - HOSTNAME=0.0.0.0
      - PORT=3000
      - INTERNAL_API_BASE=http://server:8000
      - APP_PREFIX=${APP_PREFIX}
      - NEXT_PUBLIC_APP_PREFIX=${APP_PREFIX}
      - ORIGIN=${ORIGIN}
      - KEYCLOAK_PUBLIC_URL=${ORIGIN}${APP_PREFIX}/auth
      - NEXT_PUBLIC_KEYCLOAK_URL=${ORIGIN}${APP_PREFIX}/auth
      - AUTH_KEYCLOAK_ID=${AUTH_KEYCLOAK_ID:-glow-client}
      - NEXT_PUBLIC_AUTH_KEYCLOAK_ID=${AUTH_KEYCLOAK_ID:-glow-client}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 45s   # (see step 3)
    depends_on:
      server:
        condition: service_healthy
    networks:
      - internal
      - public_net
  # --------------------
  # Nginx Service
  # --------------------
  nginx:
    image: nginx:1.25
    container_name: ${COMPOSE_PROJECT_NAME}-nginx
    env_file:
      - .env
    volumes:
      - ./web/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./web/generated:/etc/nginx/conf.d/generated:rw
    ports:
      - "${CLIENT_PORT}:80"
    depends_on:
      - client
      - server
      - keycloak
    networks:
      - internal
      - public_net

  docker-gen:
    image: jwilder/docker-gen:0.7.6
    container_name: ${COMPOSE_PROJECT_NAME}-docker-gen
    restart: unless-stopped
    environment:
    - COMPOSE_PROJECT_NAME=${COMPOSE_PROJECT_NAME}
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - ./web/templates:/etc/docker-gen/templates:ro
      - ./web/generated:/etc/nginx/conf.d/generated:rw
    command: >
      -notify-sighup ${COMPOSE_PROJECT_NAME}-nginx
      -watch
      /etc/docker-gen/templates/api_socketio.upstream.tmpl
      /etc/nginx/conf.d/generated/api_socketio.upstream.conf
    networks:
      - internal
      - public_net

volumes:
  pgdata:
  history:
  uploads:
  cypress:
